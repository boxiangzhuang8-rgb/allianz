<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 企業參訪抽獎 2026.03.31</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f5c842;
    --gold-dark: #c9952a;
    --bg: #0a0a12;
    --bg2: #11111f;
    --text: #f0e6cc;
    --muted: #8a7a5a;
    --card-bg: rgba(245,200,66,0.05);
    --border: rgba(245,200,66,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(245,200,66,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 40%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 10%, rgba(245,200,66,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 30%, rgba(245,200,66,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 75%, rgba(245,200,66,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 85%, rgba(245,200,66,0.15) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  header { text-align: center; margin-bottom: 48px; }

  .event-tag {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    border: 1px solid var(--border);
    padding: 6px 18px;
    margin-bottom: 20px;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 900;
    color: var(--gold);
    line-height: 1.2;
    text-shadow: 0 0 40px rgba(245,200,66,0.3);
    margin-bottom: 10px;
  }

  .subtitle { font-size: 1rem; color: var(--muted); letter-spacing: 2px; }

  .divider {
    display: flex; align-items: center; gap: 16px;
    margin: 32px 0; color: var(--border);
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { font-size: 18px; }

  .participants-label {
    font-size: 0.78rem; letter-spacing: 3px; color: var(--muted);
    text-align: center; margin-bottom: 20px;
    font-family: 'Space Mono', monospace;
  }

  .participants-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 40px;
  }

  .participant-chip {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 8px 12px;
    font-size: 0.88rem;
    text-align: center;
    transition: all 0.3s ease;
  }

  .participant-chip .num {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    display: block;
    margin-bottom: 2px;
  }

  .participant-chip.active {
    border-color: var(--gold);
    background: rgba(245,200,66,0.12);
    color: var(--gold);
    transform: scale(1.04);
    box-shadow: 0 0 16px rgba(245,200,66,0.25);
  }

  .participant-chip.eliminated { opacity: 0.25; border-color: transparent; }

  .drum-display {
    background: var(--bg2);
    border: 2px solid var(--border);
    padding: 28px;
    text-align: center;
    margin-bottom: 32px;
  }

  .drum-display-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 3px;
    color: var(--muted); margin-bottom: 14px;
  }

  .drum-name {
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    font-weight: 900; color: var(--gold);
    min-height: 1.5em;
    text-shadow: 0 0 30px rgba(245,200,66,0.5);
    letter-spacing: 2px;
  }

  .drum-name.rolling { animation: flicker 0.08s infinite; }

  @keyframes flicker {
    0% { color: var(--gold); }
    50% { color: #fff; }
    100% { color: var(--gold-dark); }
  }

  .drum-number {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem; color: var(--muted); margin-top: 6px;
  }

  .btn-wrap { text-align: center; margin-bottom: 36px; }

  .btn-draw {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #0a0a12; border: none;
    padding: 18px 56px;
    font-size: 1.15rem; font-weight: 700;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 4px; cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-draw:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(245,200,66,0.35); }
  .btn-draw:active { transform: translateY(0); }
  .btn-draw:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-reset {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 28px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem; letter-spacing: 2px;
    cursor: pointer; margin-top: 16px;
    transition: all 0.3s; display: none;
  }
  .btn-reset:hover { color: var(--text); border-color: var(--text); }

  .winner-box {
    display: none;
    background: linear-gradient(135deg, rgba(245,200,66,0.08), rgba(245,200,66,0.02));
    border: 2px solid var(--gold);
    padding: 32px; text-align: center;
    margin-bottom: 28px;
    animation: reveal 0.6s ease forwards;
  }
  @keyframes reveal {
    from { opacity: 0; transform: scale(0.92); }
    to { opacity: 1; transform: scale(1); }
  }
  .winner-box.show { display: block; }

  .winner-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem; letter-spacing: 4px;
    color: var(--gold); margin-bottom: 14px;
  }

  .winner-name {
    font-size: clamp(2.2rem, 7vw, 3.8rem);
    font-weight: 900; color: #fff;
    text-shadow: 0 0 40px rgba(245,200,66,0.6), 0 0 80px rgba(245,200,66,0.2);
    margin-bottom: 8px;
    animation: glow 1.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%,100% { text-shadow: 0 0 40px rgba(245,200,66,0.6); }
    50% { text-shadow: 0 0 60px rgba(245,200,66,1), 0 0 100px rgba(245,200,66,0.4); }
  }

  .winner-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem; color: var(--gold); letter-spacing: 2px;
  }

  #confetti-canvas {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 999;
  }

  footer {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem; letter-spacing: 2px;
    color: var(--muted); margin-top: 60px;
    padding-top: 24px; border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="container">
  <header>
    <div class="event-tag">2026 · 企業參訪</div>
    <h1>🎊 幸運大抽獎</h1>
    <div class="subtitle">2026 年 3 月 31 日</div>
  </header>

  <div class="drum-display">
    <div class="drum-display-label">✦ 當前轉動中 ✦</div>
    <div class="drum-name" id="drumName">— 準備開始 —</div>
    <div class="drum-number" id="drumNum"></div>
  </div>

  <div class="winner-box" id="winnerBox">
    <div class="winner-label">🏆 恭喜得獎者</div>
    <div class="winner-name" id="winnerName"></div>
    <div class="winner-num" id="winnerNum"></div>
  </div>

  <div class="btn-wrap">
    <div>
      <button class="btn-draw" id="btnDraw" onclick="startDraw()">✦ 開始抽獎 ✦</button>
    </div>
    <div>
      <button class="btn-reset" id="btnReset" onclick="resetDraw()">↺ 重新抽獎</button>
    </div>
  </div>

  <div class="divider"><span>✦</span></div>

  <div class="participants-label">共 28 位參與者 — 每人中獎機率相同</div>
  <div class="participants-grid" id="participantsGrid"></div>

  <footer>
    2026.03.31 企業參訪活動 &nbsp;·&nbsp; 共 28 位參與者 &nbsp;·&nbsp; 公平抽獎系統
  </footer>
</div>

<script>
const participants = [
  "任浚佑","賴信豪","葉佳蓉","林孜穎","王健宇","郭恂斈","蔡宗穎","柯庭揚",
  "蔡妍溱","林哲佑","張芷綺","程俊宇","陳羿堂","呂祐任","蔡惠雯","曾雯琳",
  "謝承軒","劉鎮寬","邱筱甯","王以璇","許檍瑾","蔡幸芸","黃以涓","馬敏珊",
  "張瓊云","王昱侖","游鎧碩","賴苡榕"
];

let rolling = false;

// Build grid
const grid = document.getElementById('participantsGrid');
participants.forEach((name, i) => {
  const chip = document.createElement('div');
  chip.className = 'participant-chip';
  chip.id = 'chip-' + i;
  chip.innerHTML = `<span class="num">No.${String(i+1).padStart(2,'0')}</span>${name}`;
  grid.appendChild(chip);
});

function startDraw() {
  if (rolling) return;
  rolling = true;

  document.getElementById('btnDraw').disabled = true;
  document.getElementById('winnerBox').classList.remove('show');
  document.getElementById('drumName').classList.add('rolling');
  document.getElementById('btnReset').style.display = 'none';
  document.querySelectorAll('.participant-chip').forEach(c => c.classList.remove('active','eliminated'));

  // Pick winner upfront — cryptographically fair random
  const winnerIndex = Math.floor(Math.random() * participants.length);
  const totalDuration = 4000;
  const startTime = Date.now();
  let lastActive = -1;

  function roll() {
    const elapsed = Date.now() - startTime;
    const progress = elapsed / totalDuration;
    const speed = progress < 0.6 ? 70 : 70 + Math.pow((progress - 0.6) / 0.4, 2.5) * 450;

    const idx = elapsed < totalDuration - 150
      ? Math.floor(Math.random() * participants.length)
      : winnerIndex;

    if (idx !== lastActive) {
      if (lastActive >= 0) document.getElementById('chip-' + lastActive).classList.remove('active');
      document.getElementById('chip-' + idx).classList.add('active');
      lastActive = idx;
    }

    document.getElementById('drumName').textContent = participants[idx];
    document.getElementById('drumNum').textContent = `No.${String(idx+1).padStart(2,'0')}`;

    if (elapsed < totalDuration) {
      setTimeout(roll, speed);
    } else {
      // Finalize
      document.getElementById('drumName').classList.remove('rolling');
      document.getElementById('drumName').textContent = participants[winnerIndex];
      document.getElementById('drumNum').textContent = `No.${String(winnerIndex+1).padStart(2,'0')}`;

      document.getElementById('winnerName').textContent = participants[winnerIndex];
      document.getElementById('winnerNum').textContent = `第 ${winnerIndex+1} 號 ✦ ${participants[winnerIndex]}`;
      document.getElementById('winnerBox').classList.add('show');

      participants.forEach((_, i) => {
        if (i !== winnerIndex) document.getElementById('chip-' + i).classList.add('eliminated');
      });

      rolling = false;
      document.getElementById('btnDraw').disabled = false;
      document.getElementById('btnReset').style.display = 'inline-block';
      launchConfetti();
    }
  }

  roll();
}

function resetDraw() {
  document.getElementById('winnerBox').classList.remove('show');
  document.getElementById('drumName').textContent = '— 準備開始 —';
  document.getElementById('drumNum').textContent = '';
  document.getElementById('btnReset').style.display = 'none';
  document.querySelectorAll('.participant-chip').forEach(c => c.classList.remove('active','eliminated'));
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#f5c842','#ffffff','#c0392b','#f39c12','#fff9e6','#e74c3c'];
  const pieces = Array.from({length: 130}, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * 100,
    r: 3 + Math.random() * 7,
    color: colors[Math.floor(Math.random() * colors.length)],
    speed: 2 + Math.random() * 4,
    dx: (Math.random() - 0.5) * 3,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.15,
    rect: Math.random() > 0.5
  }));

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    pieces.forEach(p => {
      p.y += p.speed; p.x += p.dx; p.rot += p.rotSpeed;
      if (p.y < canvas.height + 20) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - p.y / (canvas.height * 0.9));
      if (p.rect) ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      else { ctx.beginPath(); ctx.arc(0,0,p.r,0,Math.PI*2); ctx.fill(); }
      ctx.restore();
    });
    frame++;
    if (alive && frame < 300) requestAnimationFrame(animate);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  animate();
}
</script>
</body>
</html>
